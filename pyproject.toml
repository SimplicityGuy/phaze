[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "phaze"
version = "0.1.0"
description = "A music alignment tool"
license = "MIT"
requires-python = ">=3.13,<3.14"
dependencies = [
    "alembic>=1.18.4",
    "saq[redis]>=0.26.3",
    "asyncpg>=0.31.0",
    "beautifulsoup4>=4.14.3",
    "essentia-tensorflow>=2.1b6.dev1389; sys_platform != 'linux' or platform_machine == 'x86_64'",
    "fastapi>=0.135.2",
    "httpx>=0.28.1",
    "litellm>=1.82.6,<1.82.7",
    "lxml>=6.0.2",
    "mutagen>=1.47.0",
    "numpy>=1.26.0",
    "pydantic-settings>=2.13.1",
    "python-multipart>=0.0.20",
    "rapidfuzz>=3.14.3",
    "sqlalchemy>=2.0.48",
    "sse-starlette>=3.3.4",
    "uvicorn>=0.42.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/phaze"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 150
target-version = "py313"

[tool.ruff.lint]
select = ["ARG", "B", "C4", "E", "F", "I", "PLC", "PTH", "RUF", "S", "SIM", "T20", "TCH", "UP", "W", "W191"]
ignore = ["B008", "C901", "E501", "S101"]

[tool.ruff.lint.per-file-ignores]
"src/phaze/main.py" = ["T201"]
"src/phaze/cli/**" = ["T201"]
"tests/**" = ["T201", "PLC", "S105", "ARG001"]
"services/**" = ["S603", "S607"]

[tool.ruff.lint.isort]
lines-after-imports = 2
combine-as-imports = true
split-on-trailing-comma = true
force-sort-within-sections = true
known-first-party = ["phaze"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = false

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
mypy_path = ["src"]
exclude = "^(tests/|prototype/|services/)"

[[tool.mypy.overrides]]
module = ["essentia", "essentia.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["mutagen", "mutagen.*"]
ignore_missing_imports = true

[tool.coverage.run]
source = ["phaze"]
omit = ["tests/*"]
concurrency = ["greenlet", "thread"]

[tool.coverage.report]
fail_under = 85
precision = 2
show_missing = true

[dependency-groups]
dev = [
    "bandit>=1.8",
    "greenlet>=3.3.2",
    "httpx>=0.28.1",
    "mypy>=1.15",
    "pip-audit>=2.9",
    "pre-commit>=4.2",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.11",
]
