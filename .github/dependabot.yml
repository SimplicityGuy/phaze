---
version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    # Supply-chain cooldown: defer updates until a release is 7 days old, matching
    # the `[tool.uv] exclude-newer = "7 days"` window in every pyproject.toml. Stops
    # Dependabot from opening PRs that pin a brand-new release (the 1.82.7/1.82.8
    # malicious-release risk class) before it has been in the wild long enough.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "SimplicityGuy"
    groups:
      actions:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    assignees:
      - "SimplicityGuy"
    groups:
      docker-images:
        patterns:
          - "*"

  # Python dependencies (uv/pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    assignees:
      - "SimplicityGuy"
    open-pull-requests-limit: 10
    groups:
      python-production:
        dependency-type: "production"
        patterns:
          - "*"
      python-development:
        dependency-type: "development"
        patterns:
          - "*"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
