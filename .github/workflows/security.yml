---
name: Security

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0

      - name: 🐍 Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: 🔧 Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Install dependencies
        run: just install

      - name: 🔍 Run pip-audit
        run: just pip-audit

      - name: 🛡️ Run bandit
        run: just security

      - name: 🌐 Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8

  semgrep:
    name: Semgrep CE Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 🔬 Run semgrep scan
        run: >-
          semgrep scan --config auto --error
          --sarif --output semgrep.sarif

      - name: 🧹 Remove nosemgrep-suppressed findings
        run: |
          python3 - <<'EOF'
          import json
          with open("semgrep.sarif") as f:
              sarif = json.load(f)
          for run in sarif.get("runs", []):
              run["results"] = [
                  r for r in run.get("results", [])
                  if not r.get("suppressions")
              ]
          with open("semgrep.sarif", "w") as f:
              json.dump(sarif, f)
          EOF
        if: always()

      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: semgrep.sarif
        if: always()

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: 🔑 Run TruffleHog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f  # v3.95.8
        with:
          path: ./
          extra_args: --only-verified

  container-scanning:
    name: Container Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 🛡️ Run trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: 📤 Upload trivy SARIF results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        if: always()
        with:
          sarif_file: trivy-results.sarif
