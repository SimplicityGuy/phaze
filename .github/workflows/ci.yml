---
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    uses: ./.github/workflows/code-quality.yml

  test:
    needs: quality
    uses: ./.github/workflows/tests.yml

  security:
    uses: ./.github/workflows/security.yml
