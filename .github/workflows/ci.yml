---
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CI: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    uses: ./.github/workflows/code-quality.yml

  test:
    needs: quality
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  security:
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write
