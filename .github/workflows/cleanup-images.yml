---
name: Cleanup Docker Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 15 * *"

concurrency:
  group: cleanup-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        package:
          - phaze
          - phaze/audfprint
          - phaze/panako
      fail-fast: false

    permissions:
      packages: write  # Required to delete packages
      contents: read

    steps:
      - name: 🧹 Cleanup Docker Images - ${{ matrix.package }}
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f  # v1.2.2
        with:
          delete-partial-images: true
          delete-untagged: true
          keep-n-tagged: 2
          older-than: 30 days
          # D-16 pins production deployments to a specific CalVer release tag
          # (PHAZE_IMAGE_TAG=<version>, e.g. 2026.5.0 or 2026.5). keep-n-tagged
          # + older-than only look at recency, so once more than 2 releases age
          # past 30 days, a pinned tag is exactly the kind of image they'd
          # delete out from under a re-provisioned deployment. exclude-tags
          # takes priority over every other rule (including keep-n-tagged and
          # older-than), so semver-shaped release tags — and their -arm64
          # variants — are never garbage-collected here, regardless of age or
          # how many releases have since shipped.
          exclude-tags: ^\d+\.\d+(\.\d+)?(-arm64)?$
          use-regex: true
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ matrix.package }}
          owner: ${{ github.repository_owner }}
