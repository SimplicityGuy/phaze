---
name: Docker Validate

on:
  workflow_call:

concurrency:
  group: docker-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

permissions:
  contents: read

jobs:
  validate-dockerfiles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile
            context: .
          - name: audfprint
            dockerfile: services/audfprint/Dockerfile.audfprint
            context: .
          - name: panako
            dockerfile: services/panako/Dockerfile.panako
            context: .

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔍 Validate Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

      - name: 🐳 Test Docker build
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          CONTEXT: ${{ matrix.context }}
          NAME: ${{ matrix.name }}
        run: |
          echo "🔨 Testing build for ${NAME}..."
          docker build -f "${DOCKERFILE}" "${CONTEXT}"
          echo "✅ ${NAME} built successfully"

  validate-docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@v6

      - name: 🐳 Validate docker-compose.yml
        run: |
          echo "🔍 Validating Docker Compose configuration..."
          docker compose config --quiet
          echo "✅ docker-compose.yml is valid"
