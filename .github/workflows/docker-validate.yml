---
name: Docker Validate

on:
  workflow_call:

concurrency:
  group: docker-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

permissions:
  contents: read

jobs:
  validate-dockerfiles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile
            context: .
          - name: audfprint
            dockerfile: services/audfprint/Dockerfile.audfprint
            context: .
          - name: panako
            dockerfile: services/panako/Dockerfile.panako
            context: .
          # Phase 47 CLOUDIMG-02: hadolint-gate the arm64 agent Dockerfile. The
          # real native build runs in docker-publish.yml's build-arm64 job — a
          # full QEMU C++ compile on this x86 ubuntu-latest runner is forbidden
          # (slow + flaky), so the "Test Docker build" + import-smoke steps below
          # are guarded off for this entry (lint-only).
          - name: agent-arm64
            dockerfile: Dockerfile.agent-arm64
            context: .

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: 🔍 Validate Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

      # Skipped for agent-arm64: a native build runs in docker-publish.yml's
      # build-arm64 job; a QEMU C++ compile here would be prohibitively slow.
      - name: 🐳 Test Docker build
        if: matrix.name != 'agent-arm64'
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          CONTEXT: ${{ matrix.context }}
          NAME: ${{ matrix.name }}
        run: |
          echo "🔨 Testing build for ${NAME}..."
          docker build -f "${DOCKERFILE}" -t "phaze-validate-${NAME}:ci" "${CONTEXT}"
          echo "✅ ${NAME} built successfully"

      # Import-smoke for the api image: a successful `docker build` does NOT prove the
      # image boots — runtime-only ImportErrors (a missing native backend installed
      # by the deps but not loadable on the slim base) pass the build and crash-loop
      # at startup. v4.1.0 shipped exactly this: psycopg with no libpq backend ->
      # `ImportError: no pq wrapper available` on `import phaze.main`. Running the
      # real import chain here catches that class of regression before release.
      - name: 🔎 Import smoke — api image boots (import phaze.main)
        if: matrix.name == 'api'
        run: |
          echo "🔎 Importing phaze.main inside the built api image..."
          # Use `uv run` (matching the image CMD `uv run uvicorn ...`) so the import
          # resolves in the uv-managed venv where phaze + its native deps are installed,
          # not the system python. UV_NO_SYNC=1 is set in the image, so this won't re-sync.
          docker run --rm "phaze-validate-api:ci" \
            uv run python -c "import phaze.main; print('✅ import phaze.main OK — native backends (psycopg/essentia) load on the slim base')"

      # Fingerprint smoke for the panako image (phaze-vp07). A green `docker build` did
      # NOT prove this image works: 2026.7.7 shipped with a 0-byte COPY layer and no
      # /app/panako.jar at all (the glob `Panako-*-all.jar` never matched the actual
      # lowercase `panako-2.1-all.jar`), so every /ingest 500'd in production while
      # /health still reported "healthy". This step asserts the jar is really present
      # AND drives a real store+query round trip through the HTTP API.
      - name: 🎧 Fingerprint smoke — panako stores and queries a fixture
        if: matrix.name == 'panako'
        run: |
          set -euo pipefail

          echo "🔎 Asserting the shaded jar is a non-empty, extractable file..."
          cid="$(docker create phaze-validate-panako:ci)"
          docker cp "${cid}:/app/panako.jar" ./panako-extracted.jar
          docker rm -f "${cid}" >/dev/null
          jar_bytes="$(stat -c%s ./panako-extracted.jar)"
          echo "   /app/panako.jar = ${jar_bytes} bytes"
          # The exact 2026.7.7 regression: a zero-match glob COPY yields an EMPTY layer.
          test "${jar_bytes}" -gt 1000000 \
            || { echo "::error::/app/panako.jar is missing or implausibly small (${jar_bytes} bytes)"; exit 1; }

          echo "🚀 Starting the panako sidecar..."
          docker run -d --name panako-smoke -p 18002:8002 phaze-validate-panako:ci

          echo "⏳ Waiting for the service to answer..."
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:18002/health; then break; fi
            sleep 2
          done

          echo "🩺 /health must report healthy on a correctly built image..."
          health="$(curl -fsS http://localhost:18002/health)"
          echo "   ${health}"
          echo "${health}" | grep -q '"status":"healthy"' \
            || { echo "::error::/health did not report healthy"; docker logs panako-smoke; exit 1; }

          # Build a broadband fixture in-container. Panako's Olaf strategy needs real
          # spectral peaks; a narrowband synthetic tone yields zero fingerprints.
          echo "🎼 Generating the fixture clip..."
          docker exec -u root panako-smoke sh -c \
            'mkdir -p /audio && ffmpeg -v error -f lavfi -i "anoisesrc=d=25:c=pink:r=44100:a=0.5" \
               -f lavfi -i "sine=frequency=440:r=44100:d=25" \
               -filter_complex "[0][1]amix=inputs=2:duration=shortest,tremolo=f=2:d=0.7" \
               -ac 1 -ar 44100 /audio/smoke.wav -y'

          echo "📥 POST /ingest ..."
          ingest="$(curl -fsS -X POST http://localhost:18002/ingest \
            -H 'Content-Type: application/json' -d '{"file_path":"/audio/smoke.wav"}')"
          echo "   ${ingest}"
          echo "${ingest}" | grep -q '"status":"ingested"' \
            || { echo "::error::/ingest did not succeed"; docker logs panako-smoke; exit 1; }

          echo "🔍 POST /query — the stored clip must match itself..."
          query="$(curl -fsS -X POST http://localhost:18002/query \
            -H 'Content-Type: application/json' -d '{"file_path":"/audio/smoke.wav"}')"
          echo "   ${query}"
          # A real self-match returns the stored path. The null-sentinel row that Panako
          # emits for "no match" is filtered out by the parser, so an empty match list
          # here means the store genuinely did not persist any fingerprints.
          echo "${query}" | grep -q '/audio/smoke.wav' \
            || { echo "::error::/query returned no self-match — store did not persist fingerprints"; docker logs panako-smoke; exit 1; }

          echo "🧪 /health must go UNHEALTHY when the jar is removed (the outage scenario)..."
          docker exec -u root panako-smoke rm -f /app/panako.jar
          code="$(curl -s -o /tmp/h.json -w '%{http_code}' http://localhost:18002/health)"
          echo "   HTTP ${code} $(cat /tmp/h.json)"
          test "${code}" = "503" \
            || { echo "::error::/health still reported OK with the jar removed"; exit 1; }

          docker rm -f panako-smoke >/dev/null
          echo "✅ panako fingerprint smoke passed"

  validate-docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔀 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 🐳 Validate docker-compose.yml
        run: |
          echo "🔍 Validating application-server docker-compose.yml..."
          # Phase 29 added fail-fast ${VAR:?} guards on REDIS_PASSWORD; the
          # infra-hardening bugfix batch (phaze-rnh7) added the same on POSTGRES_PASSWORD.
          # Supply placeholders so compose-parse can resolve interpolation.
          printf '%s\n' \
            'REDIS_PASSWORD=ci-validate-placeholder' \
            'REDIS_BIND_IP=127.0.0.1' \
            'POSTGRES_PASSWORD=ci-validate-placeholder' \
            'POSTGRES_BIND_IP=127.0.0.1' \
            > .env
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: 🐳 Validate docker-compose.agent.yml
        run: |
          echo "🔍 Validating agent (file-server) docker-compose.agent.yml..."
          # Phase 29 file-server compose requires SCAN_PATH on all 4 services;
          # supply placeholders so compose-parse can resolve interpolation.
          printf '%s\n' \
            'SCAN_PATH=/tmp/phaze-ci-scan-placeholder' \
            'MODELS_PATH=/tmp/phaze-ci-models-placeholder' \
            'PHAZE_API_URL=https://app-server.example:8000' \
            'PHAZE_REDIS_URL=redis://default:ci-placeholder@app-server.example:6379/0' \
            'PHAZE_AGENT_TOKEN=phaze_agent_ci-placeholder' \
            'PHAZE_AGENT_ID=ci-agent' \
            > .env.agent
          docker compose -f docker-compose.agent.yml --env-file .env.agent config --quiet
          echo "✅ docker-compose.agent.yml is valid"
