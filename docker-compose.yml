---
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn phaze.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Application-server worker -- control role (fileless SAQ tasks only).
  # Phase 26 D-04: replaces the legacy combined SAQ module; the file-bound
  # half moves to per-agent `phaze.tasks.agent_worker.settings` workers shipped
  # via docker-compose.agent.yml in Phase 29. PHAZE_ROLE=control selects
  # ControlSettings in phaze.config.get_settings().
  # audfprint + panako dependencies removed -- controller is fileless and the
  # fingerprint sidecars are only reachable from the agent worker. Volumes are
  # kept for now because the application-server image still contains code paths
  # that reference SCAN_PATH / MODELS_PATH; Phase 29 will strip them.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run saq phaze.tasks.controller.settings
    env_file: .env
    environment:
      - MODELS_PATH=/models
      - PHAZE_ROLE=control
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - "${MODELS_PATH:-./models}:/models:ro"
      - "${OUTPUT_PATH:-/data/output}:/data/output:rw"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Phase 27 D-19: always-on watcher. Will move to docker-compose.agent.yml in Phase 29
  # alongside the renamed worker (per Phase 26 D-04 plan). Image is the same as worker
  # but entry point is python -m phaze.agent_watcher (NOT saq settings).
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m phaze.agent_watcher
    env_file: .env
    environment:
      - PHAZE_ROLE=agent
      # PHAZE_AGENT_API_URL, PHAZE_AGENT_TOKEN, PHAZE_AGENT_SCAN_ROOTS come from .env
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phaze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phaze}
      POSTGRES_DB: ${POSTGRES_DB:-phaze}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaze"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  audfprint:
    build:
      context: .
      dockerfile: services/audfprint/Dockerfile.audfprint
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - audfprint_data:/data/fprint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  panako:
    build:
      context: .
      dockerfile: services/panako/Dockerfile.panako
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - panako_data:/data/fprint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  audfprint_data:
  panako_data:
