---
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn phaze.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run saq phaze.tasks.worker.settings
    env_file: .env
    environment:
      - MODELS_PATH=/models
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - "${MODELS_PATH:-./models}:/models:ro"
      - "${OUTPUT_PATH:-/data/output}:/data/output:rw"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      audfprint:
        condition: service_healthy
      panako:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phaze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phaze}
      POSTGRES_DB: ${POSTGRES_DB:-phaze}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaze"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  audfprint:
    build:
      context: .
      dockerfile: services/audfprint/Dockerfile.audfprint
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - audfprint_data:/data/fprint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  panako:
    build:
      context: .
      dockerfile: services/panako/Dockerfile.panako
    volumes:
      - "${SCAN_PATH:-/data/music}:/data/music:ro"
      - panako_data:/data/fprint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  audfprint_data:
  panako_data:
