---
# Application-server compose. Phase 29 hardening (D-05, D-17, D-19):
#   - Only the application-server services live here: {api, worker, postgres, redis}.
#   - The watcher, agent-worker, and audfprint/panako sidecar services live in
#     docker-compose.agent.yml (deployed on the file server in Plan 04+).
#   - api + worker have NO music/model/output file mounts (DIST-01). The api
#     container only mounts ./certs/ so the cert bootstrap (Plan 01) can read
#     and write the auto-generated CA + leaf certificates.
#   - Redis is hardened per D-05: --requirepass with REDIS_PASSWORD env var
#     (fail-fast at compose-parse time), LAN-bound port via REDIS_BIND_IP,
#     and an authenticated healthcheck with --no-auth-warning.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m phaze.entrypoint
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      # ./certs/ is bind-mounted rw so phaze.cert_bootstrap can generate the
      # CA + leaf certificates on first start (idempotent on subsequent starts).
      - "${CA_PATH:-./certs}:/certs:rw"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Application-server worker -- control role (fileless SAQ tasks only).
  # Phase 29 D-17: the agent-side counterpart lives in docker-compose.agent.yml.
  # PHAZE_ROLE=control selects ControlSettings in phaze.config.get_settings().
  # No volume mounts: the controller is fileless and never touches SCAN_PATH,
  # MODELS_PATH, or OUTPUT_PATH (DIST-01).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run saq phaze.tasks.controller.settings
    env_file: .env
    environment:
      - PHAZE_ROLE=control
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phaze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phaze}
      POSTGRES_DB: ${POSTGRES_DB:-phaze}
    volumes:
      # postgres:18+ stores data in a major-version-specific subdirectory under
      # /var/lib/postgresql to support pg_upgrade --link without mount-boundary
      # issues. Mount the parent dir (not /var/lib/postgresql/data).
      # See: https://github.com/docker-library/postgres/pull/1259
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaze"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    # Phase 29 D-05 / AUTH-03: --requirepass with REDIS_PASSWORD interpolation
    # (`${VAR:?msg}` fails fast at compose-parse time if unset). The agent-side
    # half of AUTH-03 lives in AgentSettings._enforce_redis_password_in_production
    # (Plan 02): production agents reject passwordless redis_url.
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
    ports:
      # Bind to loopback in dev; production overrides REDIS_BIND_IP to the
      # app-server's LAN IP (e.g. 192.168.1.10) so agents on other hosts reach
      # it. WITHOUT an explicit IP prefix, docker binds to 0.0.0.0.
      - "${REDIS_BIND_IP:-127.0.0.1}:6379:6379"
    healthcheck:
      # --no-auth-warning suppresses redis-cli's stderr warning about passing
      # the password on the command line. The ping itself still requires auth.
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
