---
# Application-server compose. Phase 29 hardening (D-05, D-17, D-19):
#   - Only the application-server services live here: {api, worker, postgres, redis}.
#   - The watcher, agent-worker, and audfprint/panako sidecar services live in
#     docker-compose.agent.yml (deployed on the file server in Plan 04+).
#   - api + worker have NO music/model/output file mounts (DIST-01). The api
#     container only mounts ./certs/ so the cert bootstrap (Plan 01) can read
#     and write the auto-generated CA + leaf certificates.
#   - Redis is hardened per D-05: --requirepass with REDIS_PASSWORD env var
#     (fail-fast at compose-parse time), LAN-bound port via REDIS_BIND_IP,
#     and an authenticated healthcheck with --no-auth-warning.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m phaze.entrypoint
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      # phaze-hti8: Redis runs with `--requirepass ${REDIS_PASSWORD}` (below), so
      # every client MUST authenticate. `env_file` does NOT interpolate, so the
      # `.env` REDIS_URL cannot embed `${REDIS_PASSWORD}`; compose's `environment:`
      # block DOES interpolate at parse time. Assembling the authenticated URL here
      # (overriding the passwordless `.env`/default REDIS_URL) makes the NOAUTH
      # drift impossible for the app-server's own Redis clients.
      - "REDIS_URL=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0"
    # Backend execution registry (control-plane-only, ControlSettings) is declared in a
    # backends.toml mounted at PHAZE_BACKENDS_CONFIG_FILE (default /etc/phaze/backends.toml);
    # an absent file resolves to the zero-config implicit all-local registry (cloud off).
    # Mount a backends.toml to enable cloud backends.
    volumes:
      # ./certs/ is bind-mounted rw so phaze.cert_bootstrap can generate the
      # CA + leaf certificates on first start (idempotent on subsequent starts).
      - "${CA_PATH:-./certs}:/certs:rw"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Application-server worker -- control role (fileless SAQ tasks only).
  # Phase 29 D-17: the agent-side counterpart lives in docker-compose.agent.yml.
  # PHAZE_ROLE=control selects ControlSettings in phaze.config.get_settings().
  # No volume mounts: the controller is fileless and never touches SCAN_PATH,
  # MODELS_PATH, or OUTPUT_PATH (DIST-01).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run saq phaze.tasks.controller.settings
    env_file: .env
    environment:
      - PHAZE_ROLE=control
      # phaze-hti8: same authenticated REDIS_URL assembly as the api service — the
      # control worker's before_enqueue/after_process counter + rate-limit hooks read
      # this same cache_redis handle, so it must authenticate against the requirepass
      # Redis or every hook raises NOAUTH on first use.
      - "REDIS_URL=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0"
      # Backend execution registry (control-plane-only, ControlSettings) is declared in a
      # backends.toml mounted at PHAZE_BACKENDS_CONFIG_FILE (default /etc/phaze/backends.toml);
      # an absent file resolves to the zero-config implicit all-local registry (cloud off).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    # phaze-rnh7 (D-05 / AUTH-03, mirrored from redis below): Postgres holds ALL of
    # the project's crown-jewel data (file metadata, proposals, tracklists, agent
    # token hashes), so it gets the SAME hardening as redis:
    #   - POSTGRES_PASSWORD uses `${VAR:?msg}` (fail-fast at compose-parse time) so an
    #     operator who forgets to set it errors instead of silently booting with a
    #     weak default the way `${VAR:-phaze}` did.
    #   - The published port is IP-prefixed and loopback by default; production
    #     overrides POSTGRES_BIND_IP to the app-server's LAN IP (e.g. 192.168.1.10)
    #     so agents on other hosts reach it, exactly like REDIS_BIND_IP. WITHOUT an
    #     explicit IP prefix docker binds 0.0.0.0 (all interfaces = whole LAN).
    # The api/worker containers reach Postgres via the compose-network hostname
    # `postgres:5432`, so the published host port is NOT needed for intra-stack traffic.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phaze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-phaze}
    volumes:
      # postgres:18+ stores data in a major-version-specific subdirectory under
      # /var/lib/postgresql to support pg_upgrade --link without mount-boundary
      # issues. Mount the parent dir (not /var/lib/postgresql/data).
      # See: https://github.com/docker-library/postgres/pull/1259
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phaze}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    # Phase 29 D-05 / AUTH-03: --requirepass with REDIS_PASSWORD interpolation
    # (`${VAR:?msg}` fails fast at compose-parse time if unset). The agent-side
    # half of AUTH-03 lives in AgentSettings._enforce_redis_password_in_production
    # (Plan 02): production agents reject passwordless redis_url.
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
    ports:
      # Bind to loopback in dev; production overrides REDIS_BIND_IP to the
      # app-server's LAN IP (e.g. 192.168.1.10) so agents on other hosts reach
      # it. WITHOUT an explicit IP prefix, docker binds to 0.0.0.0.
      - "${REDIS_BIND_IP:-127.0.0.1}:6379:6379"
    healthcheck:
      # --no-auth-warning suppresses redis-cli's stderr warning about passing
      # the password on the command line. The ping itself still requires auth.
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
