<div class="border-b border-gray-200 mb-6">
    <nav class="flex gap-4 -mb-px" aria-label="Audit log filters">
        {% set tabs = [
            ("all", "All", stats.total),
            ("completed", "Completed", stats.completed),
            ("failed", "Failed", stats.failed),
            ("in_progress", "In Progress", stats.in_progress),
        ] %}
        {% for value, label, count in tabs %}
        <button
            hx-get="/audit/?status={{ value }}"
            hx-target="#audit-content"
            hx-push-url="true"
            class="px-3 py-2 text-sm font-semibold border-b-2 transition-colors
                {% if current_status == value %}
                    text-blue-600 border-blue-600
                {% else %}
                    text-gray-500 border-transparent hover:text-gray-700
                {% endif %}
            ">
            {{ label }} ({{ count }})
        </button>
        {% endfor %}
    </nav>
</div>
