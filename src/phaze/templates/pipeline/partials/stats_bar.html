<div class="grid grid-cols-6 gap-4">
    <div class="bg-blue-50 dark:bg-blue-950 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-blue-700 dark:text-blue-400">{{ stats.discovered }}</p>
        <p class="text-sm text-blue-600 dark:text-blue-400">Discovered</p>
    </div>
    <div class="bg-cyan-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-cyan-700">{{ stats.fingerprinted }}</p>
        <p class="text-sm text-cyan-600">Fingerprinted</p>
    </div>
    <div class="bg-yellow-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-yellow-700 dark:text-yellow-400">{{ stats.analyzed }}</p>
        <p class="text-sm text-yellow-600 dark:text-yellow-400">Analyzed</p>
    </div>
    <div class="bg-purple-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-purple-700 dark:text-purple-400">{{ stats.proposal_generated }}</p>
        <p class="text-sm text-purple-600 dark:text-purple-400">Proposed</p>
    </div>
    <div class="bg-green-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-green-700 dark:text-green-400">{{ stats.approved }}</p>
        <p class="text-sm text-green-600 dark:text-green-400">Approved</p>
    </div>
    <div class="bg-gray-50 dark:bg-phaze-panel rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-gray-700 dark:text-gray-300">{{ stats.executed }}</p>
        <p class="text-sm text-gray-600 dark:text-gray-400 dark:text-gray-500">Executed</p>
    </div>
</div>
