<div class="grid grid-cols-5 gap-4">
    <div class="bg-blue-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-blue-700">{{ stats.discovered }}</p>
        <p class="text-sm text-blue-600">Discovered</p>
    </div>
    <div class="bg-yellow-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-yellow-700">{{ stats.analyzed }}</p>
        <p class="text-sm text-yellow-600">Analyzed</p>
    </div>
    <div class="bg-purple-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-purple-700">{{ stats.proposal_generated }}</p>
        <p class="text-sm text-purple-600">Proposed</p>
    </div>
    <div class="bg-green-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-green-700">{{ stats.approved }}</p>
        <p class="text-sm text-green-600">Approved</p>
    </div>
    <div class="bg-gray-50 rounded-lg p-4 text-center">
        <p class="text-2xl font-bold text-gray-700">{{ stats.executed }}</p>
        <p class="text-sm text-gray-600">Executed</p>
    </div>
