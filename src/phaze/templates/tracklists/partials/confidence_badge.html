{% if confidence is not none %}
{% if confidence >= 90 %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-green-100 text-green-700">{{ "%.0f"|format(confidence) }}%</span>
{% elif confidence >= 70 %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">{{ "%.0f"|format(confidence) }}%</span>
{% else %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-red-100 text-red-700">{{ "%.0f"|format(confidence) }}%</span>
{% endif %}
{% endif %}
