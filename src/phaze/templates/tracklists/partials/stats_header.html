<div id="stats-header" class="bg-gray-50 rounded-lg p-6 mb-6">
    <div class="grid grid-cols-3 gap-4 items-end">
        <div>
            <span class="text-xs font-semibold text-gray-500 uppercase">Total Tracklists</span>
            <p class="text-xl font-semibold text-gray-900">{{ stats.total }}</p>
        </div>
        <div>
            <span class="text-xs font-semibold text-gray-500 uppercase">Matched</span>
            <p class="text-xl font-semibold text-gray-900">{{ stats.matched }}</p>
        </div>
        <div>
            <span class="text-xs font-semibold text-gray-500 uppercase">Unmatched</span>
            <p class="text-xl font-semibold text-gray-900">{{ stats.unmatched }}</p>
        </div>
    </div>
</div>
