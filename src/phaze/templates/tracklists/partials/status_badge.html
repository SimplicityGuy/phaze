{% if tracklist.status == 'proposed' %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">Proposed</span>
{% elif tracklist.status == 'approved' %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-green-100 text-green-700">Approved</span>
{% elif tracklist.status == 'rejected' %}
<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-red-100 text-red-700">Rejected</span>
{% endif %}
