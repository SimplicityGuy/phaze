{% set show_bulk = (has_candidates is defined and has_candidates) or (tracklist._has_candidates is defined and tracklist._has_candidates) %}
{% if show_bulk %}
<button hx-post="/tracklists/{{ tracklist.id }}/bulk-link"
        hx-target="#tracks-{{ tracklist.id }}"
        hx-swap="innerHTML"
        hx-confirm="Accept the top Discogs match for all tracks? This cannot be undone."
        class="text-xs bg-blue-600 dark:bg-blue-700 hover:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold px-3 py-1.5 rounded-md">
  Bulk-link All
</button>
{% endif %}
