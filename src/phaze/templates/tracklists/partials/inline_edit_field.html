<input type="text"
       name="{{ field }}"
       value="{{ value if value is defined else (track[field] or '') }}"
       class="text-sm border rounded px-2 py-1 w-full focus:outline-none focus:ring-1 bg-white dark:bg-phaze-bg {% if error %}border-red-400 focus:ring-red-500 dark:focus:ring-red-400 dark:ring-red-400{% else %}border-blue-300 focus:ring-blue-500 dark:focus:ring-blue-400 dark:ring-blue-400{% endif %}"
       hx-put="/tracklists/tracks/{{ track.id }}/edit/{{ field }}"
       hx-target="closest td"
       hx-swap="innerHTML"
       hx-trigger="blur, keyup[keyCode==13]"
       aria-label="Edit {{ field }}"
       {% if error %}aria-invalid="true" aria-describedby="track-{{ track.id }}-{{ field }}-error"{% endif %}
       autofocus>
{% if error %}
<p id="track-{{ track.id }}-{{ field }}-error" class="text-xs text-red-500 dark:text-red-400 mt-1" role="alert">{{ error }}</p>
{% endif %}
