<!DOCTYPE html>
<html lang="en" :class="$store.theme.dark ? 'dark' : ''">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Phaze{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" integrity="sha384-qKt1F1k7v69ebd7q6Na1d2FGVMI+43GgA5hpfz7i+zDfrz8rIjXYu7majL1fXSeS" crossorigin="anonymous"></script>

    <!-- Jura font (design language primary) + Inter (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Jura:wght@300;500&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.7/dist/htmx.min.js" integrity="sha384-ZBXiYtYQ6hJ2Y0ZNoYuI+Nq5MqWBr+chMrS/RkXpNzQCApHEhOt2aY8EJgqwHLkJ" crossorigin="anonymous"></script>

    <!-- HTMX SSE extension -->
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4/sse.js" integrity="sha384-QA9wXqexhwzXTuTvuF5QP82pddm3R2hy81UzXi7ioNTqNF2b75hlkkSGjafohhL3" crossorigin="anonymous"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.9/dist/cdn.min.js" integrity="sha384-MEh8ZMZhsmD6/1Bd3kfTiGZoYIKR9u+BilQQWl5DOonh+pvKg6fP2AejtOozsZK8" crossorigin="anonymous"></script>

    <!-- Theme store: auto/dark/light with localStorage persistence -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('theme', {
                mode: localStorage.getItem('phaze-theme') || 'auto',
                get dark() {
                    if (this.mode === 'dark') return true;
                    if (this.mode === 'light') return false;
                    return window.matchMedia('(prefers-color-scheme: dark)').matches;
                },
                set(mode) {
                    this.mode = mode;
                    localStorage.setItem('phaze-theme', mode);
                }
            });
        });
        // Prevent flash: apply dark class before Alpine loads
        (function() {
            const mode = localStorage.getItem('phaze-theme') || 'auto';
            const isDark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark');
        })();
    </script>

    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));

        @theme {
            /* Phaze accent palette — replaces default blue */
            --color-blue-50: #e6f7fb;
            --color-blue-100: #b3e8f3;
            --color-blue-200: #80d9eb;
            --color-blue-300: #4dcae3;
            --color-blue-400: #1abbdb;
            --color-blue-500: #00b0d8;
            --color-blue-600: #00b0d8;
            --color-blue-700: #008caf;
            --color-blue-800: #006882;
            --color-blue-900: #004455;
            --color-blue-950: #002233;

            /* Phaze dark background shades */
            --color-phaze-bg: #0a0c12;
            --color-phaze-panel: #10141c;
            --color-phaze-border: #232832;
        }
    </style>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-jura { font-family: 'Jura', sans-serif; }
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
    </style>
</head>
<body class="bg-white dark:bg-phaze-bg text-gray-900 dark:text-gray-200 min-h-screen transition-colors duration-200">

    <!-- Skip link -->
    {% block skip_link %}
    <a href="#proposals-table" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-blue-600 focus:text-white focus:px-4 focus:py-2 focus:rounded focus:z-50">Skip to proposals table</a>
    {% endblock %}

    <!-- Navigation -->
    <nav aria-label="Main navigation" class="max-w-7xl mx-auto px-4 pt-4">
        <div class="flex items-center gap-2">
            <!-- Phaze logo mark -->
            <a href="/" class="flex items-center gap-2 mr-2" aria-label="Phaze home">
                <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-blue-500 dark:text-blue-400">
                    <circle cx="50" cy="50" r="34" stroke="currentColor" stroke-width="3" fill="none"/>
                    <path d="M50 8 C44 25, 38 38, 38 50 C38 62, 44 75, 50 92" stroke="currentColor" stroke-width="3.5" fill="none" class="text-blue-400 dark:text-blue-300" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="3" fill="currentColor" class="text-blue-400 dark:text-blue-300"/>
                </svg>
                <span class="font-jura font-medium text-sm tracking-[0.2em] text-gray-800 dark:text-gray-200 hidden sm:inline">PHAZE</span>
            </a>

            <div class="flex gap-1 flex-wrap">
                <a href="/search/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'search' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Search
                </a>
                <a href="/pipeline/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'pipeline' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Pipeline
                </a>
                <a href="/proposals/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'proposals' or current_page is not defined %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Proposals
                </a>
                <a href="/preview/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'preview' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Preview
                </a>
                <a href="/duplicates/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'duplicates' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Duplicates
                </a>
                <a href="/tracklists/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'tracklists' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Tracklists
                </a>
                <a href="/tags/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'tags' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Tags
                </a>
                <a href="/cue/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'cue' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    CUE Sheets
                </a>
                <a href="/audit/"
                   class="text-sm font-semibold px-3 py-2 rounded-md transition-colors {% if current_page == 'audit' %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950{% else %}text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-50 dark:hover:bg-phaze-panel{% endif %}">
                    Audit Log
                </a>
            </div>

            <!-- Theme toggle -->
            <div class="ml-auto" x-data>
                <button
                    @click="
                        const modes = ['auto', 'dark', 'light'];
                        const next = modes[(modes.indexOf($store.theme.mode) + 1) % 3];
                        $store.theme.set(next);
                    "
                    class="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-phaze-panel transition-colors"
                    :title="'Theme: ' + $store.theme.mode"
                    aria-label="Toggle theme"
                >
                    <!-- Auto icon -->
                    <svg x-show="$store.theme.mode === 'auto'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <!-- Dark icon (moon) -->
                    <svg x-show="$store.theme.mode === 'dark'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" x-cloak>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                    </svg>
                    <!-- Light icon (sun) -->
                    <svg x-show="$store.theme.mode === 'light'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" x-cloak>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

</body>
</html>
