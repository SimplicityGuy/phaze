<div x-data="{ show: true }"
     x-init="setTimeout(() => show = false, 5000)"
     x-show="show"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="bg-slate-800 text-white rounded-lg shadow-lg px-4 py-3 flex items-center gap-3 text-sm">
    <span>{{ toast_message }}</span>
    {% if not is_bulk %}
    <button hx-patch="/proposals/{{ proposal.id }}/undo"
            hx-target="#proposal-{{ proposal.id }}"
            hx-swap="outerHTML"
            @click="show = false"
            class="text-blue-300 hover:text-blue-100 font-semibold underline">
        Undo
    </button>
    {% endif %}
</div>
