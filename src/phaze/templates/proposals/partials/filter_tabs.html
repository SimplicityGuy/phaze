<div class="border-b border-gray-200 mb-4">
    <nav class="flex space-x-4" aria-label="Status filter tabs">
        {% set tabs = [
            ("all", "All", stats.total),
            ("pending", "Pending", stats.pending),
            ("approved", "Approved", stats.approved),
            ("rejected", "Rejected", stats.rejected),
        ] %}
        {% for value, label, count in tabs %}
            <button
                hx-get="/proposals/?status={{ value }}"
                hx-target="#proposal-content"
                hx-swap="innerHTML"
                hx-push-url="true"
                class="px-3 py-2 text-sm transition-colors
                    {% if current_status == value %}
                        text-blue-600 border-b-2 border-blue-600 font-semibold
                    {% else %}
                        text-gray-500 hover:text-gray-700
                    {% endif %}
                "
            >
                {{ label }}
                <span class="text-xs bg-gray-200 text-gray-700 rounded-full px-2 py-0.5 ml-1">{{ count }}</span>
            </button>
        {% endfor %}
    </nav>
</div>
