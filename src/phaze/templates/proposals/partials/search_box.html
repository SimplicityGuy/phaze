<div class="mb-4">
    <input type="text"
           name="q"
           value="{{ search_query }}"
           placeholder="Search by filename..."
           class="w-full rounded-md border border-gray-300 dark:border-phaze-border px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 dark:ring-blue-400 focus:border-blue-500 dark:focus:border-blue-400"
           hx-get="/proposals/?status={{ current_status }}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#proposal-list-container"
           hx-swap="innerHTML"
           hx-include="this">
</div>
