<div x-data="{ show: true }"
     x-init="setTimeout(() => show = false, 10000)"
     x-show="show"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="bg-slate-800 text-white rounded-lg shadow-lg px-4 py-3 flex items-center gap-3 text-sm">
    <span>{{ toast_message }}</span>
    {% if is_bulk is defined and is_bulk %}
    <form hx-post="/duplicates/undo-all"
          hx-target="#duplicates-list"
          hx-swap="innerHTML"
          class="inline">
        <input type="hidden" name="file_states" value="{{ undo_file_states }}">
        <input type="hidden" name="page" value="{{ page if page is defined else 1 }}">
        <input type="hidden" name="page_size" value="{{ page_size if page_size is defined else 20 }}">
        <button type="submit"
                @click="show = false"
                class="text-blue-300 hover:text-blue-100 font-semibold underline">
            Undo All
        </button>
    </form>
    {% else %}
    <form hx-post="{{ undo_url }}"
          hx-target="#duplicates-list"
          hx-swap="innerHTML"
          class="inline">
        <input type="hidden" name="file_states" value="{{ undo_file_states }}">
        <button type="submit"
                @click="show = false"
                class="text-blue-300 hover:text-blue-100 font-semibold underline">
            Undo
        </button>
    </form>
    {% endif %}
</div>
