<div id="stats-header" class="bg-gray-50 rounded-lg p-6 mb-6">
    <div class="grid grid-cols-3 gap-4 items-end">
        <div>
            <span class="text-xs font-semibold text-gray-500 uppercase">Groups</span>
            <p class="text-xl font-semibold text-gray-900">{{ stats.groups }}</p>
        </div>
        <div>
            <span class="text-xs font-semibold text-gray-500 uppercase">Total Files</span>
            <p class="text-xl font-semibold text-gray-900">{{ stats.total_files }}</p>
        </div>
        <div class="flex items-end justify-between">
            <div>
                <span class="text-xs font-semibold text-gray-500 uppercase">Recoverable</span>
                <p class="text-xl font-semibold text-gray-900">{{ stats.recoverable_bytes | filesizeformat }}</p>
            </div>
            <form hx-post="/duplicates/resolve-all"
                  hx-target="#duplicates-list"
                  hx-swap="innerHTML">
                <input type="hidden" name="page" value="{{ pagination.page if pagination is defined else 1 }}">
                <input type="hidden" name="page_size" value="{{ pagination.page_size if pagination is defined else 20 }}">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-md">
                    Accept All
                </button>
            </form>
        </div>
    </div>
</div>
